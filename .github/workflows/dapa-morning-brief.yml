name: DAPA Morning Brief

on:
  schedule:
    - cron: "30,45 20 * * *"
    - cron: "0,15,30 21 * * *"
  repository_dispatch:
    types: [dapa-morning-brief]
  workflow_dispatch:

concurrency:
  group: dapa-morning-brief-${{ github.event_name }}
  cancel-in-progress: false

jobs:
  send-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      PYTHONPATH: src
      TZ: Asia/Seoul
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - id: kst-date
        run: echo "today=$(TZ=Asia/Seoul date +%F)" >> "$GITHUB_OUTPUT"
      - id: send-window
        if: github.event_name != 'workflow_dispatch'
        run: |
          now_epoch=$(TZ=Asia/Seoul date +%s)
          target_epoch=$(TZ=Asia/Seoul date -d "$(TZ=Asia/Seoul date +%F) 06:30:00" +%s)
          latest_epoch=$(TZ=Asia/Seoul date -d "$(TZ=Asia/Seoul date +%F) 06:50:00" +%s)

          if [ "$now_epoch" -lt "$target_epoch" ]; then
            sleep_seconds=$((target_epoch - now_epoch))
            echo "Waiting ${sleep_seconds}s for 06:30 KST send window."
            sleep "$sleep_seconds"
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          elif [ "$now_epoch" -le "$latest_epoch" ]; then
            echo "should_send=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping because GitHub started after 06:50 KST."
            echo "should_send=false" >> "$GITHUB_OUTPUT"
          fi
      - id: sent-cache
        if: github.event_name != 'workflow_dispatch'
        uses: actions/cache/restore@v4
        with:
          path: .dapa-sent
          key: dapa-morning-brief-${{ steps.kst-date.outputs.today }}
      - name: Send Telegram brief
        if: github.event_name == 'workflow_dispatch' || (steps.send-window.outputs.should_send == 'true' && steps.sent-cache.outputs.cache-hit != 'true')
        run: uv run python -m dapa_morning_brief.cli --days 3 --fallback-days 5
      - name: Mark scheduled brief sent
        if: github.event_name != 'workflow_dispatch' && steps.send-window.outputs.should_send == 'true' && steps.sent-cache.outputs.cache-hit != 'true' && success()
        run: |
          mkdir -p .dapa-sent
          echo "${{ steps.kst-date.outputs.today }}" > ".dapa-sent/${{ steps.kst-date.outputs.today }}"
      - if: github.event_name != 'workflow_dispatch' && steps.send-window.outputs.should_send == 'true' && steps.sent-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .dapa-sent
          key: dapa-morning-brief-${{ steps.kst-date.outputs.today }}
